name: Validate Documentation

on:
  pull_request:
    branches: [main-v1]
    paths:
      - '**.mdx'
      - 'docs.json'
      - 'scripts/**'
  push:
    branches: [main-v1]
    paths:
      - '**.mdx'
      - 'docs.json'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Mintlify CLI
        run: npm install -g mintlify@latest

      - name: Validate docs.json syntax
        run: |
          echo "🔍 Validating docs.json syntax..."
          mintlify validate
          echo "✅ docs.json validation passed"

      - name: Validate file references
        run: |
          echo "🔍 Checking all docs.json references exist..."
          npm run validate:refs
          echo "✅ File references validation passed"

      - name: Validate i18n parity
        run: |
          echo "🔍 Validating i18n parity..."
          npm run validate:i18n
          echo "✅ i18n parity validation passed"

      - name: Find orphaned files
        run: |
          echo "🔍 Searching for orphaned files..."
          npm run validate:orphans
          echo "✅ Orphaned files check passed"

      - name: Check for broken internal links
        run: |
          echo "🔍 Checking for broken internal links..."
          npx markdown-link-check en/**/*.mdx vi/**/*.mdx --quiet || true
          echo "✅ Link check complete"

      - name: Summary
        if: success()
        run: |
          echo "✅ All validation checks passed!"
          echo "📊 Summary:"
          echo "  - docs.json syntax: valid"
          echo "  - File references: all exist"
          echo "  - i18n parity: synchronized"
          echo "  - Orphaned files: checked"
          echo "  - Internal links: checked"
